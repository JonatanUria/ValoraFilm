<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart_checkout" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
    <h2>Iconos de Google:</h2>
    <i class="material-icons" style="color: brown;">cloud</i> <br>
    <i class="material-icons" style="width: 23px; height: 23px;">traffic</i> <br>
    <i class="material-icons" style="width: 23px; height: 23px;">html</i> <hr>
    <h2>Símbolos de Google:</h2>
    <span class="material-symbols-outlined">shopping_cart_checkout</span> <hr>
    <h2>Iconos de Bootstrap:</h2>
    <i class="glyphicon glyphicon-envelope"></i>
    
</body>
</html>
