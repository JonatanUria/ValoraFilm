<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraficosSVG</title>
</head>
<body>
    
<h2>Este es un círculo: </h2>
<svg width="100" height="100">
  <circle cx="50" cy="50" r="40"
  stroke="green" stroke-width="6" fill="blue">
    </svg>
<hr>

<h2>Este es un rectángulo con opacidad: </h2>
<svg width="400" height="120">
  <rect x="10" y="10" width="200" height="100" stroke="red" stroke-width="6" fill="black" style="opacity: 0.7;">
</svg>
<hr>

<h2>Esta es una estrella:</h2>
<svg width="300" height="200">
  <polygon points="100,10 40,198 190,78 10,78 160,198"
  style="fill:rgb(255, 247, 0);stroke:purple;stroke-width:5;fill-rule:evenodd;">
</svg>
<hr>

<h2>Esta es una elipse con texto y degradado:</h2>
<svg height="130" width="500">
  <defs>
    <linearGradient id="grad1">
      <stop offset="0%" stop-color="brown" />
      <stop offset="100%" stop-color="red" />
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="70" rx="85" ry="55" fill="url(#grad1)" />
  <text fill="#ffffff" font-size="20" font-family="Verdana" x="50" y="76">Hola Juan</text>
</svg>

</body>
</html>
