<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapeoImagenes</title>
</head>
<body>
    <h2 style="text-align: center;">Esto es un mapeo de imagen:</h2>
    <img src="img/zonadetrabajo.jpg" alt="Zona de trabajo" usemap="#workmap" width="400" height="379">
    <map name="workmap">
      <area shape="rect" coords="34,44,270,350" alt="Computer" href="https://en.wikipedia.org/wiki/Computer" target="_blank">
      <area shape="rect" coords="290,172,333,250" alt="Coffee" href="https://en.wikipedia.org/wiki/Coffee" target="_blank">
      <area shape="rect" coords="30,42,260,350" alt="Phone" href=https://en.wikipedia.org/wiki/Mobile_phone target="_blank">
    </map>
    
</body>
</html>
