<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImagenesAnimadas</title>
    <link rel="shortcut icon" href="img/Homer.gif" type="image/x-icon">
    <style>
        body {
            background-image: url(img/fondo.jpg);
            background-attachment: fixed;
            background-size: 100%;
        }
        p {
            font-size: 30px;
        }
    </style>
</head>
<body>

    <p style="text-align: center;">Esta es una imagen animada: </p>
    <p> <img src="img/Homer.gif" alt="Homer Simpson corriendo y saltando" style= "float:right; width:  100px;height: 100px;">
     Esta imagen tiene width, height y se situará a la derecha del texto. </p> 
     <br> <br>
     <p><img src="img/Hell.gif" alt="Monstruo de fuego con llamas" style= "float:left; width:  100px;height: 100px;">
     Esta imagen tiene width, height y se situará a la izquierda del texto. </p>
    </body>
</html>
