<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas</title>
  <style>
    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      background-color: #d91111;
      overflow: hidden
    }

    li {
      float: left;
      color: white;
      text-align: center;
      padding: 16px;
    }
  </style>
</head>

<body>
  <p>Esto es un ejemplo de una lista descriptiva: </p>
  <dl>
    <dt>Nombre</dt>
      <dd>- Juan</dd>
      <dd>- Ernesto</dd>
      <dd>- Matías</dd>
    <dt>Notas</dt>
      <dd>- 5</dd>
      <dd>- 8,7</dd>
      <dd>- 3,6</dd>
  </dl>
  <hr>
  <p>Esta es una lista desordenada colocada de forma horizontal:</p>
  <ul>
    <li>Inicio</li>
    <li>Novedades </li>
    <li>Contacto</li>
    <li>Sobre mí</li>
  </ul>
  <hr>


</body>

</html>
