<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <link rel="stylesheet" href="estilobozsizing.css">
</head>

<body>
    <h1>Sin usar box-sizing</h1>

    <div class="div1">Este div es más pequeño (el ancho son 300px y el largo son 100px).</div>
    <br>
    <div class="div2">Este div más grande (el ancho son 300px y el largo son 100px).</div>
    <br>

    <h1>Usando box-sizing</h1>

    <div class="div3">Ambos div son del mismo tamaño</div>
    <br>
    <div class="div4">Hooray!</div>

</body>

</html>
