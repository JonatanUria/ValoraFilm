<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination 2</title>
    <link rel="stylesheet" href="estilopagination2.css">
</head>

<body>
    <h2>Pagination con efecto hover con un clase activa y una deshabilitada</h2>
    <ul class="pagination">
        <li><a href="#">&laquo;</a></li>
        <li><a href="#">1</a></li>
        <li><a class="active" href="#">2</a></li>
        <li><a href="#">3</a></li>
        <li><a href="#">4</a></li>
        <li><a href="#">5</a></li>
        <li><a class="disabled" href="#">&raquo;</a></li>
    </ul>

</body>

</html>
