<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropDown Menu</title>
    <link rel="stylesheet" href="estilodropdownmenu.css">
</head>

<body>
    <h2>Menú Desplegable:</h2>
    <p>Pasa el ratón sobre uno de los dos botones para que se despliegue el menú.</p>

    <div class="dropdown" style="float: left;">
        <button class="dropbtn">Menú desplegable 1</button>
        <div class="dropdown-content">
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
        </div>
    </div>

    <div class="dropdown" style="float: right;">
        <button class="dropbtn">Menú desplegable 2</button>
        <div class="dropdown-content">
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
        </div>
    </div>



</body>

</html>
