<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masked Img 4</title>
</head>

<body>
    <p>Una SVG mask layer (formada por círculos):</p>
    <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        <mask id="svgmask1">
            <circle fill="#ffffff" cx="75" cy="75" r="75"></circle>
            <circle fill="#ffffff" cx="80" cy="260" r="75"></circle>
            <circle fill="#ffffff" cx="270" cy="160" r="75"></circle>
        </mask>
        <image xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img\cinque-terre.jpg" mask="url(#svgmask1)">
        </image>
    </svg>

    <hr>

    <p>Imagen Original</p>
    <img src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>

</html>
