<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Card</title>
    <link rel="stylesheet" href="estiloshadowcard.css">
</head>

<body>
    <h1>Ejemplo de una tarjeta con Box-shadow</h1>
    <div class="card">
        <div class="header">
            <h1>1</h1>
        </div>

        <div class="container">
            <p>Enero 1, 2025</p>
        </div>
    </div>

    <hr>

    <h1>Ejemplo de una tarjeta con imagen con Box-shadow</h1>
    <div class="imgcard">
        <img src="img/italia-alberobello.jpg" alt="Alberolbello, Italia" style="width:100%">
        <div class="imgcontainer">
            <p>Alberobello, Italia</p>
        </div>
    </div>

</body>

</html>
