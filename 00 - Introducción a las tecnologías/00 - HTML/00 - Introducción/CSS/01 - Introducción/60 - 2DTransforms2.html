<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Transforms 2</title>
    <link rel="stylesheet" href="estilo2dtransforms2.css">
</head>

<body>
    <h1>La función scaleX()</h1>
    <div id="divix">
        Este div ha sido agrandado dos veces en su ancho.
    </div>

    <div id="divdx">
        Este div ha sido empequeñecido a la mitad en su ancho.
    </div>

    <hr>

    <h1>La función scaleY()</h1>

    <div id="diviy">
        Este div ha sido agrandado tres veces en su altura.
    </div> <br>

    <div id="divdy">
        Este div ha sido empequeñecido a la mitad en su altura.
    </div>

</body>

</html>
