<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masked Img</title>
    <link rel="stylesheet" href="estilomaskedimg.css">
</head>

<body>
    <p>Una imagen con mask layer image:</p>
    <img class="mask1" src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

    <hr>

    <p>Una imagen con mask layer image que se repite:</p>
    <img class="mask2" src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

    <hr>

    <p>Una imagen con mask layer image centrada:</p>
    <img class="mask3" src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

    <hr>

    <p>Imagen Original:</p>
    <img src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>

</html>
