<form method="get">

</form>

<div class="div1">Si pasas el mouse por aquí, se despliega un saludo.

</div>

<hr>

<h2>Usando First-Child</h2>
<div class="div2">
  <p>Texto de ejemplo.</p>
  <p>Texto de ejemplo.</p>

    <p>Texto de ejemplo.</p>
    <p>Texto de ejemplo.</p>
  </div>
