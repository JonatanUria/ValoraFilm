<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes Imgs 3</title>
    <link rel="stylesheet" href="estiloshapesimgs3.css">
</head>

<body>
    <h1>La función ellipse()</h1>
    <p>clip-path:ellipse(50% 35%)</p>
    <img id="img1" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>clip-path:ellipse(50% 35% at right)</p>
    <img id="img2" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>clip-path:ellipse(40% 25%)</p>
    <img id="img3" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>circle-path:ellipse(40% 50%)</p>
    <img id="img4" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>Imagen Original:</p>
    <img src="img/fondo.jpg" alt="Fondo" width="300" height="300">

</body>

</html>
