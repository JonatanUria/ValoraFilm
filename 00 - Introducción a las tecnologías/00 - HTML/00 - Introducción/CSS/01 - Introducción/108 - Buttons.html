<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link rel="stylesheet" href="estilobuttons.css">
</head>

<body>
    <h2>Botones de diferentes colores y tamaños</h2>
    <button class="button button1">Verde 10px</button>
    <button class="button button2">Azul 12px</button>
    <button class="button button3">Rojo 16px</button>
    <button class="button button4">Gres 20px</button>
    <button class="button button5">Negro 24px</button>

    <hr>

    <h2>Botones con diferente padding</h2>
    <button class="button button6">10px 24px</button>
    <button class="button button7">12px 28px</button>
    <button class="button button8">14px 40px</button>
    <button class="button button9">32px 16px</button>
    <button class="button button10">16px</button>

    <hr>

    <h2>Botones con diferentes bordes</h2>
    <button class="button button11">solid verde</button>
    <button class="button button12">dotted azul</button>
    <button class="button button13">dashed rojo</button>
    <button class="button button14">solid gris</button>
    <button class="button button15">solid negro</button>

    <hr>

    <h2>Botones con diferentes border-radius</h2>
    <button class="button button16">2px</button>
    <button class="button button17">4px</button>
    <button class="button button18">8px</button>
    <button class="button button19">12px</button>
    <button class="button button20">50%</button>

    <hr>

    <h2>Botones con box-shadow</h2>
    <button class="button button21">Botón con box-shadow</button>
    <button class="button button22">Botón hover box-shadow</button>
</body>

</html>
