<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Down Menu 2</title>
    <link rel="stylesheet" href="estilodropdownmenu2.css">
</head>
<body>
<h2>Imagen desplegable</h2>
<p>Mueve el ratón sobre la imagen para desplegarla.</p>

<div class="dropdown">
  <img src="img/italia-alberobello.jpg" alt="Alberobello, Italia" width="100" height="50">
  <div class="dropdown-content">
    <img src="img/italia-alberobello.jpg" alt="Alberobello, Italia" width="300" height="200">
    <div class="desc">Alberobello, en Italia</div>
  </div>
</div>
    
</body>
</html>
