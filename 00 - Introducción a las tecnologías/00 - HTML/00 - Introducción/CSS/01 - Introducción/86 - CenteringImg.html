<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering Images</title>
    <link rel="stylesheet" href="estilocenteringimages.css">
</head>

<body>
    <h2>Centrar una Imagen con margin:auto</h2>

    <img src="img/italia-alberobello.jpg" alt="Aberobello, Italia" style="width: 50%;" id="img1">

    <hr>

    <h2>Centrar una Imagen horizontalmente con display:flex</h2>
    <div id="div1">
        <img src="img/italia-alberobello.jpg" alt="Aberobello, Italia" style="width: 50%;">
    </div>

    <hr>

    <h2>Centrar una Imagen horizontalmente y verticalmente con display:flex</h2>
    <div id="div2">
        <img src="img/italia-alberobello.jpg" alt="Aberobello, Italia" style="width: 45%;">
    </div>

    <hr>
    <h2>Centrar una Imagen horizontalmente y verticalmente con display:grid</h2>
    <div id="div3">
        <img src="img/italia-alberobello.jpg" alt="Aberobello, Italia" style="width: 45%;">
    </div>

</body>

</html>
