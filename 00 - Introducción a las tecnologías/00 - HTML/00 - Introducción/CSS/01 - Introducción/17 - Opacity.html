<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opacity</title>
  <link rel="stylesheet" href="estiloopacity.css">
</head>

<body>

  <h2>Cajas con opacidad</h2>
  <div class="first">
    <p>opacity 0.1</p>
  </div>
  <div class="second">
    <p>opacity 0.3</p>
  </div>
  <div class="third">
    <p>opacity 0.6</p>
  </div>
  <div>
    <p>opacity 1 (por defecto)</p>
  </div>

  <hr>

  <h2>Cajas con opacidad usando Background</h2>
  <div class="class1">
    <p>10% opacity</p>
  </div>
  <div class="class2">
    <p>30% opacity</p>
  </div>
  <div class="class3">
    <p>60% opacity</p>
  </div>
  <div class="class4">
    <p>opacity 1 (por defecto)</p>
  </div>

  <hr>

  <h2>Texto en caja transparente</h2>
  <div class="background">
    <div class="transbox">
      <p>Este texto tiene que ir en una caja transparente.</p>
    </div>
  </div>


</body>

</html>
