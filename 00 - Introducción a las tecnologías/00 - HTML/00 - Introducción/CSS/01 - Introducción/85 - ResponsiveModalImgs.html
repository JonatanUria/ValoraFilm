<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Modal Imgs</title>
    <link rel="stylesheet" href="estiloresponsivemodalimg.css">
</head>

<body>
    <h1>Modal Imágenes Adaptables</h1>

    <div class="gallery">
        <img src="img/cinque-terre.jpg" alt="Cinque Terre" class="gallery-item"
            onclick="openModal('modal1', 'Cinque Terre')" width="600" height="400">
        <img src="img/green-forest.jpg" alt="Forest" class="gallery-item" onclick="openModal('modal2', 'Forest')"
            width="600" height="400">
        <img src="img/northern-lights.jpg" alt="Northern Lights" class="gallery-item"
            onclick="openModal('modal3', 'Nothern Lights')" width="600" height="400">
        <img src="img/mountains.jpg" alt="Mountains" class="gallery-item" onclick="openModal('modal4', 'Mountains')"
            width="600" height="400">
    </div>


    <div id="modal1" class="modal">
        <span class="close" onclick="closeModal('modal1')">&times;</span>
        <img src="img/cinque-terre.jpg" alt="Cinque Terre" class="modal-content" width="600" height="400">
        <div class="caption"></div>
    </div>

    <div id="modal2" class="modal">
        <span class="close" onclick="closeModal('modal2')">&times;</span>
        <img src="img/green-forest.jpg" alt="Forest" class="modal-content" width="600" height="400">
        <div class="caption"></div>
    </div>

    <div id="modal3" class="modal">
        <span class="close" onclick="closeModal('modal3')">&times;</span>
        <img src="img/northern-lights.jpg" alt="Northern Lights" class="modal-content" width="600" height="400">
        <div class="caption"></div>
    </div>

    <div id="modal4" class="modal">
        <span class="close" onclick="closeModal('modal4')">&times;</span>
        <img src="img/mountains.jpg" alt="Mountains" class="modal-content" width="600" height="400">
        <div class="caption"></div>
    </div>

    <script>
        function openModal(modalId, caption) {
            let modal = document.getElementById(modalId);
            modal.style.display = "flex";
            modal.classList.add("show");
            let message = modal.querySelector(".caption");
            message.innerText = caption;
        }

        function closeModal(modalId) {
            let modal = document.getElementById(modalId);
            modal.classList.remove("show");
            setTimeout(function () {
                modal.style.display = "none";
                modal.querySelector(".caption").innerText = "";
            }, 300);
        }
    </script>

</body>

</html>
