<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Img Styles</title>
    <link rel="stylesheet" href="estiloimgstyles.css">
</head>

<body>
    <h2>Imagen en miniatura</h2>

    <img src="img/cinque-terre.jpg" alt="Cinque Terre" style="width: 150px;" id="imgth">

    <hr>

    <h2>Misma Imagen en miniatura con enlace</h2>

    <a target="_blank" href="img/cinque-terre.jpg"><img src="img/cinque-terre.jpg" alt="Cinque Terre" id="imglink"
            style="width: 150px;"> </a>

    <hr>

    <h2>Imagen volteada al hacer hover</h2>

    <img src="img/mountains.jpg" alt="Mountains" width="400" height="300" id="imgflip">



</body>

</html>
