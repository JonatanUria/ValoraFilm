<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inherit Example</title>
    <link rel="stylesheet" href="estiloinherit.css">
</head>

<body>

    <h1>Propiedad no heredada</h1>
    <p id="p1">Este es un parágrafo de ejemplo y <strong>esta parte</strong> no hereda el borde del p.</p>
    <hr>
    <h1>Propiedad heredada</h1>
    <p id="p2">Este es el mismo parágrafo de ejemplo, pero <strong>esta parte</strong> sí hereda el borde del p de forma
        explícita.</p>



</body>

</html>
