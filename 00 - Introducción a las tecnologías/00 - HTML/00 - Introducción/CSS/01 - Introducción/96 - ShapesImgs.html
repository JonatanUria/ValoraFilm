<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes Imgs</title>
    <link rel="stylesheet" href="estiloshapesimgs.css">
</head>

<body>
    <h1>La función circle()</h1>
    <p>clip-path:circle(50%)</p>
    <img id="img1" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>clip-path:circle(50% at right)</p>
    <img id="img2" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>clip-path:circle(40%)</p>
    <img id="img3" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>circle-path:circle(60%)</p>
    <img id="img4" src="img/fondo.jpg" alt="Fondo" width="300" height="300">

    <p>Imagen Original:</p>
    <img src="img/fondo.jpg" alt="Fondo" width="300" height="300">

</body>

</html>
