<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masked Imgs 3</title>
</head>

<body>
    <p>Una imagen con mask svg circular:</p>
    <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        <mask id="svgmask1">
            <circle r="150" cx="200" cy="200" fill="#ffffff" />
        </mask>
        <image xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img\cinque-terre.jpg" mask="url(#svgmask1)">
        </image>
    </svg>

    <hr>

    <p>Una imagen con mask svg elipse:</p>
    <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        <mask id="svgmask2">
            <ellipse cx="220" cy="150" rx="200" ry="100" fill="#ffffff" />
        </mask>
        <image xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img\cinque-terre.jpg" mask="url(#svgmask2)">
        </image>
    </svg>


    <hr>

    <p>Una imagen con mask svg triángulo</p>
    <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        <mask id="svgmask3">
            <polygon fill="#ffffff" points="200 0, 400 400, 0 400"></polygon>
        </mask>
        <image xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img\cinque-terre.jpg" mask="url(#svgmask3)">
        </image>
    </svg>

    <hr>

    <p>Una imagen con mask svg estrella</p>
    <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        <mask id="svgmask4">
            <polygon fill="#ffffff" points="100,10 40,198 190,78 10,78 160,198"></polygon>
        </mask>
        <image xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img\cinque-terre.jpg" mask="url(#svgmask4)">
        </image>
    </svg>

    <hr>

    <p>Imagen Original</p>
    <img src="img/cinque-terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>

</html>
