<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear</title>
    <link rel="stylesheet" href="estiloclear.css">
</head>
<body>
<h1>Ejemplo sin usar Clear:</h1>
<h2>Float: left </h2>
<div class="floatleft">
<div id="div1">Div 1</div>
<div id="div2">Div 2</div>
<div id="div3">Div 3</div>
</div>
<br><br><br>

<h2>Float: Right </h2>
<div class="floatright">
<div id="div4">Div 1</div>
<div id="div5">Div 2</div>
<div id="div6">Div 3</div>
</div>
<br><br><br><br>

<h1>Ejemplo con Clear y con el h2 dentro del div:</h1>
<div class="floatleft1">
<h2>Float: left </h2>
<div id="div7">Div 1</div>
<div id="div8">Div 2</div>
<div id="div9">Div 3</div>
</div>
<br><br><br>


<div class="floatright1">
<h2>Float: Right </h2>
<div id="div10">Div 1</div>
<div id="div11">Div 2</div>
<div id="div12">Div 3</div>
</div>
<br><br><br>


    
</body>
</html>
