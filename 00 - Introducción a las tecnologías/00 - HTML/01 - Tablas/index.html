<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>

<body>
    <style> 
        table, th, td { /* <-- Selector */

            border: 1px solid black;
            padding: 5px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-align: center;
        }
        th {
            color: brown;
        }
        .mainTitle {
            color: blueviolet;
        }
    </style>
    <h1 class="mainTitle"> Esta tabla está interesante </h1>
    <!-- Aquí haré esto -->
    <table>
        <tr> 
            <!-- Table row --> 
            <!-- Filas tHeader tableHeader-->
            <th>Company</th> 
            <th>Contact</th>
            <th>Country</th>
        </tr>
        <tr>
            <!-- Columnas table data -->
            <td>Alfreds Futterkiste</td> 
            <td>Maria Anders</td>
            <td>Germany</td>
        </tr>
        <tr>
            <td>Centro comercial Moctezuma</td>
            <td>Francisco Chang</td>
            <td>Mexico</td>
        </tr>
    </table>
</body>

</html>
